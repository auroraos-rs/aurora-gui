[package]
name = "aurora-egui"
version = "0.1.0"
edition = "2024"
description = "Library for building egui apps on Aurora OS"
authors = [ "Maksim Leiman <maximleyman@yandex.ru>" ]
license = "Apache 2.0"

[lib]
name = "aurora_egui"
path = "src/lib.rs"

[[bin]]
name = "demo"
path = "src/main.rs"

[dependencies]
winit = { git = "https://github.com/lmaxyz/winit", branch = "rm_maliit", default-features=false, features=["wayland", "wayland-dlopen", "rwh_06"] }
aurora_app = { git = "https://github.com/lmaxyz/aurora_app", branch = "master" }
glutin = { git = "https://github.com/lmaxyz/glutin", branch = "aurora_device_fix" }
glutin-winit = { version = "0.5.0" }
glow = "0.17.0"
egui = "0.34.1"
egui_glow = { version = "0.34.1", features = ["wayland", "winit"] }
thiserror = "2.0"

[package.metadata.generate-rpm]
name = "com.lmaxyz.egui_aurora_app"
summary = "Example with platform specific aurora os window creation"
release = "1"
assets = [
    { source = "target/release/demo", dest = "/usr/bin/com.lmaxyz.egui_aurora_app", mode = "755" },
    { source = "rpm/com.lmaxyz.egui_aurora_app.desktop", dest = "/usr/share/applications/com.lmaxyz.egui_aurora_app.desktop", mode = "644" },
    { source = "rpm/icons/86x86/com.lmaxyz.egui_aurora_app.png", dest = "/usr/share/icons/hicolor/86x86/apps/com.lmaxyz.egui_aurora_app.png", mode = "644" },
    { source = "rpm/icons/108x108/com.lmaxyz.egui_aurora_app.png", dest = "/usr/share/icons/hicolor/108x108/apps/com.lmaxyz.egui_aurora_app.png", mode = "644" },
    { source = "rpm/icons/128x128/com.lmaxyz.egui_aurora_app.png", dest = "/usr/share/icons/hicolor/128x128/apps/com.lmaxyz.egui_aurora_app.png", mode = "644" },
    { source = "rpm/icons/172x172/com.lmaxyz.egui_aurora_app.png", dest = "/usr/share/icons/hicolor/172x172/apps/com.lmaxyz.egui_aurora_app.png", mode = "644" },
]

[patch.crates-io]
winit = { git = "https://github.com/lmaxyz/winit", branch = "rm_maliit" }
glutin = { git = "https://github.com/lmaxyz/glutin", branch = "aurora_device_fix" }
